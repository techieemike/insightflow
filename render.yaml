services:
  - type: web
    name: insightflow-api
    env: node
    buildCommand: pnpm install && cd apps/api && pnpm build
    startCommand: cd apps/api && node dist/main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: insightflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://insightflow-web.onrender.com
      - key: MAX_FILE_SIZE_MB
        value: 25

  - type: web
    name: insightflow-web
    env: node
    buildCommand: pnpm install && cd apps/web && pnpm build
    startCommand: cd apps/web && pnpm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://insightflow-api.onrender.com/api

databases:
  - name: insightflow-db
    databaseName: insightflow
    plan: free
